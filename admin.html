<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Compass Homes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
            min-height: 100vh;
        }

        /* ── Password screen ── */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f4f6f8;
        }

        .login-box {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 48px 40px 40px;
            width: 340px;
            text-align: center;
        }

        .login-logo {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.08em;
            color: #003359;
            text-transform: lowercase;
            margin-bottom: 6px;
        }

        .login-logo span { font-weight: 700; text-transform: uppercase; }

        .login-box h2 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #888;
            margin-bottom: 28px;
        }

        .login-box input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #dde3ea;
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        .login-box input[type="password"]:focus { border-color: #003359; }

        .login-box button {
            width: 100%;
            background: #003359;
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: background 0.15s;
        }

        .login-box button:hover { background: #004a7c; }

        .login-error {
            color: #c0392b;
            font-size: 0.85rem;
            margin-top: 10px;
            min-height: 18px;
        }

        /* ── Dashboard ── */
        #dashboard { display: none; }

        header {
            background: #003359;
            color: #fff;
            padding: 18px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header .logo img {
            height: 36px;
            width: auto;
            display: block;
        }

        .logout-btn {
            background: transparent;
            color: rgba(255,255,255,0.75);
            border: 1.5px solid rgba(255,255,255,0.4);
            padding: 7px 18px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: all 0.15s;
        }

        .logout-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

        .container {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .dashboard-title {
            text-align: center;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #888;
            margin-bottom: 32px;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .nav-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.08);
            padding: 40px 24px;
            text-align: center;
            text-decoration: none;
            color: #003359;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            transition: box-shadow 0.15s, transform 0.15s;
            border: 2px solid transparent;
        }

        .nav-card:hover {
            box-shadow: 0 6px 28px rgba(0,51,89,0.15);
            transform: translateY(-2px);
            border-color: #003359;
        }

        .nav-card .icon {
            font-size: 2.4rem;
            line-height: 1;
        }

        .nav-card .label {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .nav-card .desc {
            font-size: 0.82rem;
            color: #777;
            font-weight: 400;
        }

        footer {
            text-align: center;
            color: #aaa;
            font-size: 0.8rem;
            padding: 30px 0 20px;
        }
    </style>
</head>
<body>

<!-- Password screen -->
<div id="login-screen">
    <div class="login-box">
        <div class="login-logo">compass <span>Homes</span></div>
        <h2>Admin Portal</h2>
        <input type="password" id="pw-input" placeholder="Enter password" />
        <button onclick="tryLogin()">Sign In</button>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- Dashboard (shown after auth) -->
<div id="dashboard">
    <header>
        <div class="logo"><img src="compass_logo_white.png" alt="Compass Homes"></div>
        <button class="logout-btn" onclick="logout()">Log Out</button>
    </header>

    <div class="container">
        <div class="dashboard-title">Select a Tool</div>
        <div class="nav-grid">
            <a class="nav-card" href="qr-labels.html">
                <div class="icon">&#128247;</div>
                <div class="label">Print QR Labels</div>
                <div class="desc">Generate and print QR code labels for all samples</div>
            </a>
            <a class="nav-card" href="reference.html">
                <div class="icon">&#128203;</div>
                <div class="label">Print Reference Sheet</div>
                <div class="desc">Sortable table of all samples with pricing groups</div>
            </a>
        </div>
    </div>

    <footer>compass HOMES &copy; <span id="yr"></span></footer>
</div>

<script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    const PASSWORD = 'compass2026';

    function tryLogin() {
        const val = document.getElementById('pw-input').value;
        if (val === PASSWORD) {
            sessionStorage.setItem('ch_admin', '1');
            showDashboard();
        } else {
            document.getElementById('login-error').textContent = 'Incorrect password. Please try again.';
            document.getElementById('pw-input').value = '';
            document.getElementById('pw-input').focus();
        }
    }

    function logout() {
        sessionStorage.removeItem('ch_admin');
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('pw-input').value = '';
        document.getElementById('login-error').textContent = '';
    }

    function showDashboard() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    }

    // Allow Enter key on password input
    document.getElementById('pw-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') tryLogin();
    });

    // Check session on load
    if (sessionStorage.getItem('ch_admin') === '1') showDashboard();
</script>
</body>
</html>
