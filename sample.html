<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Info – Compass Homes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
        }

        header {
            background: #003359;
            color: #fff;
            padding: 18px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header .logo img { height: 56px; width: auto; display: block; }

        .container {
            max-width: 780px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 32px;
        }

        .badge-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
        }

        .badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 4px;
        }

        .badge-id   { background: #003359; color: #fff; }
        .badge-tile { background: #1a6e99; color: #fff; }
        .badge-hardwood { background: #7B4F2E; color: #fff; }
        .badge-carpet   { background: #3D6B4F; color: #fff; }

        h2 {
            font-size: 1.6rem;
            color: #003359;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 1.05rem;
            color: #555;
            margin-bottom: 24px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .meta-item label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #888;
            margin-bottom: 4px;
        }

        .meta-item span { font-size: 1rem; color: #222; }

        h3 {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #003359;
            margin-bottom: 14px;
            border-bottom: 2px solid #e0e6ed;
            padding-bottom: 6px;
        }

        .pricing-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 8px;
        }

        .pricing-table th {
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            padding: 6px 10px;
            border-bottom: 1px solid #e0e6ed;
        }

        .pricing-table td {
            padding: 10px;
            font-size: 0.97rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .pricing-table tr:last-child td { border-bottom: none; }
        .pricing-table td.price { font-weight: 600; color: #003359; }

        .error-msg, .loading-msg {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 1.05rem;
        }

        .error-msg strong { color: #c0392b; }

        footer {
            text-align: center;
            color: #aaa;
            font-size: 0.8rem;
            padding: 30px 0 20px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><img src="compass_logo_white.png" alt="Compass Homes"></div>
</header>

<div class="container">
    <div class="card" id="content">
        <div class="loading-msg">Loading sample data…</div>
    </div>
</div>

<footer>compass HOMES &copy; <span id="yr"></span></footer>

<script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    const SHEET_ID = '1cP4akGv7HwPtmVt9yxrcQYl7sIa-rkOR0tEFQBNgRD4';
    const BASE_SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=0&sheet=`;

    const CATEGORIES = {
        Tile: {
            tab: 'Tile',
            badgeClass: 'badge-tile',
            metaFields: [
                { label: 'Manufacturer', keys: ['manufacturer'] },
                { label: 'Collection',   keys: ['collection'] },
                { label: 'Color',        keys: ['color'] },
                { label: 'Size',         keys: ['size'] },
                { label: 'Material',     keys: ['material'] },
                { label: 'Finish',       keys: ['finish'] },
            ],
            pricingFields: [
                { label: 'Floor',       keys: ['floor'] },
                { label: 'Wall',        keys: ['wall'] },
                { label: 'Backsplash',  keys: ['backsplash'] },
            ],
        },
        Hardwood: {
            tab: 'Hardwood',
            badgeClass: 'badge-hardwood',
            metaFields: [
                { label: 'Manufacturer',  keys: ['manufacturer'] },
                { label: 'Collection',    keys: ['collection'] },
                { label: 'Construction',  keys: ['construction'] },
            ],
            pricingFields: [
                { label: 'Group', keys: ['group'] },
            ],
        },
        Carpet: {
            tab: 'Carpet',
            badgeClass: 'badge-carpet',
            metaFields: [
                { label: 'Manufacturer', keys: ['manufacturer'] },
                { label: 'Collection',   keys: ['collection'] },
                { label: 'Color',        keys: ['color'] },
                { label: 'Fiber',        keys: ['fiber'] },
                { label: 'Style',        keys: ['style'] },
            ],
            pricingFields: [
                { label: 'Group', keys: ['group'] },
            ],
        },
    };

    function getCategoryFromId(id) {
        const upper = id.toUpperCase();
        if (upper.startsWith('TL-')) return 'Tile';
        if (upper.startsWith('HW-')) return 'Hardwood';
        if (upper.startsWith('CP-')) return 'Carpet';
        return null;
    }

    function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
    }

    function colVal(row, headers, ...names) {
        for (const name of names) {
            const i = headers.findIndex(h => h && h.toLowerCase().trim() === name.toLowerCase());
            if (i !== -1) {
                const cell = row.c[i];
                return cell && cell.v != null ? String(cell.v).trim() : '';
            }
        }
        return '';
    }

    function fmt(val) {
        if (!val) return '—';
        const n = parseFloat(val);
        if (!isNaN(n)) return '$' + n.toFixed(2);
        return val;
    }

    function renderError(msg) {
        document.getElementById('content').innerHTML =
            `<div class="error-msg"><strong>Error:</strong> ${msg}</div>`;
    }

    function renderSample(sampleId, row, headers, category, config) {
        const metaItems = config.metaFields
            .map(f => {
                const v = colVal(row, headers, ...f.keys);
                return `<div class="meta-item"><label>${f.label}</label><span>${v || '—'}</span></div>`;
            })
            .join('');

        const manufacturer = colVal(row, headers, 'manufacturer');
        const collection   = colVal(row, headers, 'collection');

        const pricingRows = config.pricingFields
            .map(f => {
                const v = colVal(row, headers, ...f.keys);
                return v ? `<tr><td>${f.label}</td><td class="price">${fmt(v)}</td></tr>` : '';
            })
            .join('');

        const pricingHTML = pricingRows ? `
            <h3>Pricing</h3>
            <table class="pricing-table">
                <thead><tr><th>Group</th><th>Price</th></tr></thead>
                <tbody>${pricingRows}</tbody>
            </table>` : '';

        document.getElementById('content').innerHTML = `
            <div class="badge-row">
                <span class="badge badge-id">Sample ID: ${sampleId}</span>
                <span class="badge ${config.badgeClass}">${category}</span>
            </div>
            <h2>${manufacturer || '—'}</h2>
            <div class="subtitle">${collection || ''}</div>
            <div class="meta-grid">${metaItems}</div>
            ${pricingHTML || '<div class="loading-msg" style="padding:20px 0">No pricing data found.</div>'}
        `;
    }

    async function fetchSheet(tab) {
        const res  = await fetch(BASE_SHEET_URL + encodeURIComponent(tab));
        const text = await res.text();
        const json = text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, '');
        return JSON.parse(json);
    }

    async function load() {
        const sampleId = getParam('id') || getParam('sample') || getParam('sampleId');
        if (!sampleId) {
            renderError('No sample ID provided. Add <code>?id=YOUR_SAMPLE_ID</code> to the URL.');
            return;
        }

        const categoryName = getCategoryFromId(sampleId);
        if (!categoryName) {
            renderError(`Cannot determine category for ID "<strong>${sampleId}</strong>". Expected prefix TL-, HW-, or CP-.`);
            return;
        }

        const config = CATEGORIES[categoryName];

        let data;
        try {
            data = await fetchSheet(config.tab);
        } catch (e) {
            renderError('Could not load spreadsheet data. Make sure the sheet is set to "Anyone with the link can view".');
            return;
        }

        const table = data.table;
        if (!table || !table.rows || table.rows.length === 0) {
            renderError(`The ${categoryName} tab appears to be empty.`);
            return;
        }

        const headers = table.rows[0].c.map(cell => (cell && cell.v != null ? String(cell.v) : ''));
        const rows    = table.rows.slice(1);

        const idColIdx = headers.findIndex(h =>
            h && ['sample id', 'id', 'sampleid'].includes(h.toLowerCase().trim())
        );

        let match = null;
        for (const row of rows) {
            const cell = idColIdx >= 0 ? row.c[idColIdx] : null;
            const val  = cell ? String(cell.v || '').trim() : '';
            if (val.toLowerCase() === sampleId.toLowerCase()) {
                match = row;
                break;
            }
        }

        if (!match) {
            renderError(`No sample found with ID "<strong>${sampleId}</strong>" in the ${categoryName} tab.`);
            return;
        }

        renderSample(sampleId, match, headers, categoryName, config);
    }

    load();
</script>
</body>
</html>
